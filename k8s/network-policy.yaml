apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: landiq-network-policy
  namespace: landiq
spec:
  podSelector:
    matchLabels:
      app: landiq-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: landiq-frontend
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 5000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to: []   # allow outbound DNS
      ports:
        - protocol: UDP
          port: 53
