apiVersion: apps/v1
kind: Deployment
metadata:
  name: landiq-frontend
  namespace: landiq
  labels:
    app: landiq-frontend
    version: "2.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: landiq-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: landiq-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/YOUR_ORG/landiq-frontend:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: landiq-frontend-service
  namespace: landiq
spec:
  selector:
    app: landiq-frontend
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: landiq-frontend-hpa
  namespace: landiq
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: landiq-frontend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
