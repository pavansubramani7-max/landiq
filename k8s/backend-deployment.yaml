apiVersion: apps/v1
kind: Deployment
metadata:
  name: landiq-backend
  namespace: landiq
  labels:
    app: landiq-backend
    version: "2.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: landiq-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: landiq-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: backend
          image: ghcr.io/YOUR_ORG/landiq-backend:IMAGE_TAG
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef:
                name: landiq-config
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: landiq-secrets
                  key: SECRET_KEY
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: landiq-secrets
                  key: JWT_SECRET_KEY
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: landiq-secrets
                  key: DATABASE_URL
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: reports
              mountPath: /app/reports
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: uploads
          emptyDir: {}
        - name: reports
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: landiq-backend-service
  namespace: landiq
spec:
  selector:
    app: landiq-backend
  ports:
    - name: http
      port: 5000
      targetPort: 5000
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: landiq-backend-hpa
  namespace: landiq
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: landiq-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
