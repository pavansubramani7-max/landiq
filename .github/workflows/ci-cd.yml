name: LandIQ CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND:  ghcr.io/${{ github.repository_owner }}/landiq-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/landiq-frontend

jobs:
  # ── Backend Tests ──────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flask flask-cors flask-jwt-extended flask-limiter werkzeug python-dotenv
          pip install sqlalchemy alembic
          pip install numpy==1.26.4 pandas==2.2.3 joblib==1.4.2 scikit-learn==1.5.2
          pip install xgboost==2.0.3
          pip install reportlab==4.2.5 Pillow==11.0.0
          pip install prometheus-flask-exporter pytest requests

      - name: Train ML models
        run: python models/train_model.py

      - name: Run pytest
        run: pytest tests/ -v --tb=short
        env:
          SECRET_KEY: test-secret-key
          JWT_SECRET_KEY: test-jwt-key
          DATABASE_URL: sqlite:///./test_landiq.db

  # ── Frontend Build ─────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build production bundle
        run: npm run build
        env:
          REACT_APP_API_URL: http://localhost:5000
          CI: false

  # ── Docker Build & Push ────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:sha-${{ github.sha }}
          no-cache: true

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:sha-${{ github.sha }}
          build-args: REACT_APP_API_URL=https://api.landiq.in
          no-cache: true
